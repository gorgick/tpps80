version: "3.3"

volumes:
  postgres_data:
  static_data:
  media_data:

services:
  dab:
    image: postgres:13.0-alpine
    container_name: dev-dab
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  back:
    build: ./backend
    container_name: dev-back
    env_file: .env
    volumes:
      - static_data:/app/static
    depends_on:
      - dab
    ports:
      - 8000:8000
    links:
      - dab
    restart: always
    command: sh -c "python3 manage.py makemigrations &&
                    python3 manage.py migrate &&
                    python3 manage.py collectstatic --noinput &&
                    gunicorn tpps80.wsgi:application --bind 0.0.0.0:8000"

  ngin:
    image: nginx:latest
    container_name: dev-ngin
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_data:/app/static
      - media_data:/app/media
    ports:
      - 80:80
    restart: always